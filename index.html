    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

      const entry = manifest[uuid];

        const bytes = new Uint8Array(binaryStr.length);

        // load/error, so awaiting would hang forever.

    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).

    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');

    }

      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };

      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }

    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;

        // parent.location.hash change), nudge the iframe.

        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });

      var gen = ++navGen;

        // iframe may be cross-origin, and cw.* access would throw.

        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}

        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);

:14px 0 0;\">\"Dit kan ik toch zelf?\"<\u002Fh2>\n      <p style=\"font-size:18px; line-height:1.55; color:#5e524c; margin:18px 0 0;\">Klopt — de tools zijn vaak gratis. Maar jouw tijd, aandacht en avonden zijn dat niet. Het verschil zit niet in toegang tot AI, maar in het werkend krijgen én werkend houden — zonder dat het jouw project wordt.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:22px; margin-top:44px; align-items:start;\">\n      <!-- Zelf -->\n      <div style=\"background:#FCFAF5; border:1px solid #EAE1D4; border-radius:24px; padding:34px;\">\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:21px; color:#8a7d75;\">Zelf uitzoeken<\u002Fdiv>\n        <p style=\"color:#8a7d75; font-size:14.5px; margin:4px 0 22px;\">Tools genoeg — tijd niet<\u002Fp>\n        <ul style=\"list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:15px;\">\n          <li style=\"display:flex; gap:12px; font-size:15.5px; color:#6f615b;\"><span style=\"color:#A38F85; flex:none;\">✕<\u002Fspan> Avonden vol uitproberen, prompts tweaken en YouTube-tutorials<\u002Fli>\n          <li style=\"display:flex; gap:12px; font-size:15.5px; color:#6f615b;\"><span style=\"color:#A38F85; flex:none;\">✕<\u002Fspan> Losse tools die niet met elkaar of je systemen praten<\u002Fli>\n          <li style=\"display:flex; gap:12px; font-size:15.5px; color:#6f615b;\"><span style=\"color:#A38F85; flex:none;\">✕<\u002Fspan> Werkt even, en valt stil zodra er iets verandert<\u002Fli>\n          <li style=\"display:flex; gap:12px; font-size:15.5px; color:#6f615b;\"><span style=\"color:#A38F85; flex:none;\">✕<\u002Fspan> Jij blijft de helpdesk, beheerder én ontwikkelaar<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <!-- Met Oosthoek -->\n      <div style=\"background:#402A2C; color:#f4ede9; border-radius:24px; padding:34px; position:relative; box-shadow:0 30px 60px u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FCFAF5; border:1px solid #EAE1D4; border-radius:20px; padding:34px;\">\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:22px; margin:0 0 10px;\">Mensen doen de relatie<\u002Fh3>\n        <p style=\"font-size:15.5px; line-height:1.6; color:#6f615b; margin:0;\">Een mens houdt toezicht, keurt voorstellen goed en is er op de momenten die tellen. Want mensen kopen van mensen.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" style=\"max-width:1180px; margin:0 auto; padding:20px 24px 90px;\">\n    <div style=\"background:#402A2C; color:#f4ede9; border-radius:32px; padding:clamp(36px,5vw,68px); position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; left:-100px; bottom:-120px; width:380px; height:380px; border-radius:50%; background:radial-gradient(circle,rgba(30,158,105,.3),rgba(30,158,105,0) 70%);\"><\u002Fdiv>\n      <div style=\"display:flex; gap:54px; flex-wrap:wrap; position:relative;\">\n        <div style=\"flex:1 1 360px; min-width:300px;\">\n          <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:clamp(32px,4vw,52px); line-height:1.05; letter-spacing:-.02em; margin:0;\">Laten we kennismaken.<\u002Fh2>\n          <p style=\"font-size:18px; line-height:1.6; color:#d8ccc6; margin:20px 0 0; max-width:420px;\">Vertel kort waar je tijd verliest. We denken vrijblijvend met je mee en plannen — als het klikt — een AI-processcan.<\u002Fp>\n          <div style=\"display:flex; align-items:center; gap:13px; margin-top:34px;\">\n            <span style=\"width:46px; height:46px; border-radius:12px; overflow:hidden; display:block;\"><img src=\"9e827ec8-9267-4a7e-88c7-b331c285cadb\" style=\"width:100%;height:100%;object-fit:cover;display:block;\" alt=\"\"><\u002Fspan>\n            <div><div style=\"font-weight:600; font-size:15.5px;\">{{ contactEmail }}<\u002Fdiv><div style=\"color:#a8978f; font-size:13.5px;\">Eenmanszaak · Nederland · volledig remote<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 320px; min-width:280px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:20px; padding:28px;\">\n          <sc-if value=\"{{ isSuccess }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center; padding:24px 6px;\">\n              <div style=\"width:56px; height:56px; border-radius:50%; background:#24B784; color:#fff; display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 18px;\">✓<\u002Fdiv>\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:23px; color:#fff;\">Bedankt!<\u002Fdiv>\n              <p style=\"color:#d8ccc6; font-size:15px; line-height:1.55; margin:10px 0 0;\">Je bericht is binnen. Ik neem snel persoonlijk contact met je op.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notSuccess }}\" hint-placeholder-val=\"{{ true }}\">\n            <form onsubmit=\"{{ onSubmit }}\">\n              <label style=\"display:block; font-size:13.5px; color:#b9aaa3; font-weight:600; margin-bottom:7px;\">Naam<\u002Flabel>\n              <input type=\"text\" required=\"\" placeholder=\"Je naam\" value=\"{{ name }}\" onchange=\"{{ onName }}\" style=\"width:100%; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16); border-radius:11px; padding:13px 15px; color:#fff; font-size:15px; font-family:inherit; margin-bottom:18px;\">\n              <label style=\"display:block; font-size:13.5px; color:#b9aaa3; font-weight:600; margin-bottom:7px;\">E-mail<\u002Flabel>\n              <input type=\"email\" required=\"\" placeholder=\"jij@bedrijf.nl\" value=\"{{ email }}\" onchange=\"{{ onEmail }}\" style=\"width:100%; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16); border-radius:11px; padding:13px 15px; color:#fff; font-size:15px; font-family:inherit; margin-bottom:18px;\">\n              <label style=\"display:block; font-size:13.5px; color:#b9aaa3; font-weight:600; margin-bottom:7px;\">Waar verlies je tijd?<\u002Flabel>\n              <textarea rows=\"3\" required=\"\" placeholder=\"Bijv. afspraken inplannen, facturen, mail…\" value=\"{{ message }}\" onchange=\"{{ onMessage }}\" style=\"width:100%; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16); border-radius:11px; padding:13px 15px; color:#fff; font-size:15px; font-family:inherit; resize:vertical; margin-bottom:20px;\"><\u002Ftextarea>\n              <button type=\"submit\" style=\"width:100%; background:#24B784; color:#fff; border:none; padding:15px; border-radius:999px; font-weight:600; font-size:16px; font-family:inherit; cursor:pointer;\">{{ submitLabel }}<\u002Fbutton>\n              <sc-if value=\"{{ isError }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"color:#ffb4a8; font-size:13.5px; line-height:1.5; margin-top:13px; text-align:center;\">{{ errorMsg }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fform>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"border-top:1px solid #EAE1D4;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:44px 24px; display:flex; gap:28px; flex-wrap:wrap; justify-content:space-between; align-items:center;\">\n      <div style=\"display:flex; align-items:center; gap:13px;\">\n        <span style=\"width:40px; height:40px; border-radius:11px; overflow:hidden; display:block;\"><img src=\"9e827ec8-9267-4a7e-88c7-b331c285cadb\" style=\"width:100%;height:100%;object-fit:cover;display:block;\" alt=\"\"><\u002Fspan>\n        <div>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:18px;\">Oosthoek AI<\u002Fdiv>\n          <div style=\"color:#A38F85; font-size:13px;\">Wij focussen op de toekomst, zodat jij kan focussen op het nu.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:26px; flex-wrap:wrap; color:#8a7d75; font-size:14.5px;\">\n        <a href=\"#aanpak\" style=\"color:#8a7d75; text-decoration:none;\">Aanpak<\u002Fa>\n        <a href=\"#bouwstenen\" style=\"color:#8a7d75; text-decoration:none;\">Bouwstenen<\u002Fa>\n        <a href=\"#pakketten\" style=\"color:#8a7d75; text-decoration:none;\">Pakketten<\u002Fa>\n        <a href=\"#contact\" style=\"color:#8a7d75; text-decoration:none;\">Contact<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"color:#A38F85; font-size:13px;\">© {{ year }} Oosthoek AI<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;ctaLabel&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Plan een gratis kennismaking&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;contactEmail&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;hallo@oosthoek.ai&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { winIdx: 0, name: '', email: '', message: '', status: 'idle', errorMsg: '' };\n  winWords = ['Uren per week', 'Marge', 'Overzicht', 'Rust in je hoofd'];\n\n  // ─────────────────────────────────────────────────────────────────────────\n  // CONTACTFORMULIER — plak hier je GRATIS Web3Forms access key.\n  // Ophalen via https://web3forms.com : voer je e-mailadres in, je krijgt een\n  // key gemaild. Aanvragen komen daarna binnen op dat e-mailadres.\n  // Zolang hier de placeholder staat, werkt verzenden NIET.\n  WEB3FORMS_KEY = 'a97cea64-7e74-4ceb-8703-4d62f5d8ab09';\n\n  submitForm = async (e) => {\n    e.preventDefault();\n    if (this.state.status === 'sending') return;\n    this.setState({ status: 'sending', errorMsg: '' });\n    try {\n      const res = await fetch('https://api.web3forms.com/submit', {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },\n        body: JSON.stringify({\n          access_key: this.WEB3FORMS_KEY,\n          subject: 'Nieuwe kennismaking via de website',\n          from_name: 'Oosthoek AI website',\n          name: this.state.name,\n          email: this.state.email,\n          message: this.state.message,\n        }),\n      });\n      const data = await res.json();\n      if (data.success) this.setState({ status: 'success' });\n      else this.setState({ status: 'error', errorMsg: data.message || 'Er ging iets mis. Probeer het opnieuw.' });\n    } catch (err) {\n      this.setState({ status: 'error', errorMsg: 'Verbinding mislukt. Controleer je internet en probeer opnieuw.' });\n    }\n  };\n  componentDidMount() {\n    this._winTimer = setInterval(() => {\n      this.setState(s => ({ winIdx: (s.winIdx + 1) % this.winWords.length }));\n    }, 2200);\n  }\n  componentWillUnmount() {\n    clearInterval(this._winTimer);\n  }\n  renderVals() {\n    const idx = this.state.winIdx;\n    return {\n      winLine: React.createElement('span', {\n        key: idx,\n        style: { display: 'inline-block', animation: 'ohFade .5s ease both' }\n      }, this.winWords[idx]),\n      ctaLabel: this.props.ctaLabel ?? 'Plan een gratis kennismaking',\n      contactEmail: this.props.contactEmail ?? 'hallo@oosthoek.ai',\n      year: new Date().getFullYear(),\n      name: this.state.name,\n      email: this.state.email,\n      message: this.state.message,\n      onName: (e) => this.setState({ name: e.target.value }),\n      onEmail: (e) => this.setState({ email: e.target.value }),\n      onMessage: (e) => this.setState({ message: e.target.value }),\n      onSubmit: this.submitForm,\n      submitLabel: this.state.status === 'sending' ? 'Versturen…' : (this.props.ctaLabel ?? 'Plan een gratis kennismaking'),\n      isSuccess: this.state.status === 'success',\n      notSuccess: this.state.status !== 'success',\n      isError: this.state.status === 'error',\n      errorMsg: this.state.errorMsg,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Oosthoek AI Website.dc"}
